<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Anandu G</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#111;color:#fff;overflow-x:hidden;}
.bg-shape{position:fixed;z-index:0;}
.shape1{top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,102,0,0.06);transform:rotate(45deg);}
.shape2{bottom:-150px;left:-100px;width:500px;height:500px;background:rgba(255,102,0,0.04);transform:rotate(30deg);}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,102,0,0.1);}
.logo{font-size:22px;font-weight:800;color:#ff6600;letter-spacing:2px;text-decoration:none;}
.nav-links a{color:#ccc;margin:0 18px;text-decoration:none;font-size:15px;font-weight:500;transition:0.3s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:#ff6600;transition:0.3s;}
.nav-links a:hover{color:#ff6600;}
.nav-links a:hover::after{width:100%;}
.nav-links a.active{color:#ff6600;}
.hire-btn{padding:10px 24px;background:#ff6600;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px;transition:0.3s;}
.hire-btn:hover{background:#e55a00;transform:scale(1.05);}
.page-header{text-align:center;padding:60px 20px 30px;position:relative;z-index:1;}
.page-header h1{font-size:46px;font-weight:800;}
.page-header h1 span{color:#ff6600;}
.page-header p{color:#aaa;font-size:15px;margin-top:8px;}
.divider{width:60px;height:3px;background:#ff6600;margin:16px auto 0;}

/* CONTACT LAYOUT */
.contact-wrap{
  display:flex;gap:50px;max-width:1000px;
  margin:60px auto;padding:0 60px;
  position:relative;z-index:1;
}

/* INFO CARDS */
.contact-info{flex:0 0 300px;}
.info-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,102,0,0.1);
  border-radius:12px;padding:20px;display:flex;align-items:center;gap:16px;
  margin-bottom:16px;transition:0.3s;
}
.info-card:hover{border-color:#ff6600;transform:translateX(6px);}
.info-icon{
  width:46px;height:46px;border-radius:10px;
  background:rgba(255,102,0,0.15);display:flex;align-items:center;
  justify-content:center;color:#ff6600;font-size:18px;flex-shrink:0;
}
.info-text h4{font-size:13px;color:#aaa;font-weight:400;}
.info-text p{font-size:14px;color:#fff;font-weight:500;margin-top:2px;}
.info-text a{color:#fff;text-decoration:none;transition:0.3s;}
.info-text a:hover{color:#ff6600;}

.social-row{display:flex;gap:12px;margin-top:24px;}
.social-row a{
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid rgba(255,102,0,0.3);
  display:flex;align-items:center;justify-content:center;
  color:#ff6600;font-size:16px;text-decoration:none;transition:0.3s;
}
.social-row a:hover{background:#ff6600;color:#fff;border-color:#ff6600;transform:translateY(-3px);}

/* FORM */
.contact-form{flex:1;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;margin-bottom:16px;}
.form-group label{font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500;}
.form-group input,
.form-group textarea{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,102,0,0.15);
  border-radius:8px;padding:12px 16px;
  color:#fff;font-family:'Poppins',sans-serif;font-size:14px;
  outline:none;transition:0.3s;resize:vertical;
}
.form-group input:focus,
.form-group textarea:focus{border-color:#ff6600;box-shadow:0 0 0 3px rgba(255,102,0,0.1);}
.form-group textarea{min-height:130px;}
.submit-btn{
  width:100%;padding:14px;background:#ff6600;color:#fff;
  border:none;border-radius:8px;font-size:16px;font-weight:600;
  font-family:'Poppins',sans-serif;cursor:pointer;transition:0.3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{background:#e55a00;transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,102,0,0.3);}

.success-msg{
  display:none;margin-top:16px;padding:14px;
  background:rgba(0,200,0,0.1);border:1px solid rgba(0,200,0,0.2);
  border-radius:8px;color:#4ade80;text-align:center;font-size:14px;
}

footer{background:#0a0a0a;border-top:1px solid rgba(255,102,0,0.1);padding:20px;text-align:center;color:#666;font-size:14px;}
footer span{color:#ff6600;}
.reveal{opacity:0;transform:translateY(30px);transition:0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<nav>
  <a href="index.html" class="logo">AG.</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
  <a href="contact.html" class="hire-btn">Hire Me</a>
</nav>

<div class="page-header reveal">
  <h1>Contact <span>Me</span></h1>
  <p>Let's work together or just say hi!</p>
  <div class="divider"></div>
</div>

<div class="contact-wrap">
  <div class="contact-info reveal">
    <div class="info-card">
      <div class="info-icon"><i class="fab fa-github"></i></div>
      <div class="info-text">
        <h4>GitHub</h4>
        <p><a href="https://github.com/anandu112-ai" target="_blank">github.com/anandu112-ai</a></p>
      </div>
    </div>
    <div class="info-card">
      <div class="info-icon"><i class="fab fa-linkedin-in"></i></div>
      <div class="info-text">
        <h4>LinkedIn</h4>
        <p><a href="https://www.linkedin.com/in/anandug112" target="_blank">linkedin.com/in/anandug112</a></p>
      </div>
    </div>
    <div class="info-card">
      <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
      <div class="info-text">
        <h4>Location</h4>
        <p>Kerala, India</p>
      </div>
    </div>
    <div class="social-row">
      <a href="https://github.com/anandu112-ai" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/anandug112" target="_blank"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>

  <div class="contact-form reveal">
    <form action="https://formspree.io/f/maqpedeg" method="POST" id="contactForm">
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" name="name" placeholder="Anandu G" required>
        </div>
        <div class="form-group">
          <label>Your Email</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="What's this about?">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="Write your message here..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">
        <i class="fas fa-paper-plane"></i> Send Message
      </button>
      <div class="success-msg" id="successMsg">✅ Message sent successfully! I'll get back to you soon.</div>
    </form>
  </div>
</div>

<footer><p>© 2026 <span>Anandu G</span> — All Rights Reserved</p></footer>

<script>
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('visible'),i*150);});
},{threshold:0.1});
reveals.forEach(r=>observer.observe(r));

document.getElementById('contactForm').addEventListener('submit', function(e){
  setTimeout(()=>{
    document.getElementById('successMsg').style.display='block';
  },500);
});
</script>
</body>
</html>
